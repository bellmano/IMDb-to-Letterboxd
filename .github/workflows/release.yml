name: Release

on:
  workflow_dispatch

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Read version
        id: version
        run: |
          VERSION=$(cat semver.txt)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Build Chrome / Edge zip (uses manifest.json as-is)
      - name: Package Chrome / Edge extension
        run: |
          STAGING=${{ runner.temp }}/chrome-edge
          mkdir -p "$STAGING"
          cp src/manifest.json "$STAGING/manifest.json"
          cp src/background.js "$STAGING/background.js"
          cp -r src/icons "$STAGING/icons"
          cd "$STAGING"
          zip -r "${{ runner.temp }}/IMDb-to-Letterboxd-chrome-edge-v.${{ steps.version.outputs.version }}.zip" .

      # Build Firefox zip (renames manifest.firefox.json → manifest.json)
      - name: Package Firefox extension
        run: |
          STAGING=${{ runner.temp }}/firefox
          mkdir -p "$STAGING"
          cp src/manifest.firefox.json "$STAGING/manifest.json"
          cp src/background.js "$STAGING/background.js"
          cp -r src/icons "$STAGING/icons"
          cd "$STAGING"
          zip -r "${{ runner.temp }}/IMDb-to-Letterboxd-firefox-v.${{ steps.version.outputs.version }}.zip" .

      # GitHub Release with both zips attached
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            ${{ runner.temp }}/IMDb-to-Letterboxd-chrome-edge-v.${{ steps.version.outputs.version }}.zip
            ${{ runner.temp }}/IMDb-to-Letterboxd-firefox-v.${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}